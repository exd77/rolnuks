# ORBLOX - Local development stack
# Usage:
#   npm run docker:up    -> start postgres, redis, minio
#   npm run docker:down  -> stop & remove
#   npm run docker:logs  -> tail logs
#
# Production deployment is a different compose file (see docker/docker-compose.prod.yml — TBD).

name: orblox-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: orblox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orblox
      POSTGRES_PASSWORD: orblox_dev
      POSTGRES_DB: orblox
    ports:
      # Host port 5433 -> container 5432 (5432 may be in use on dev machines).
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orblox -d orblox"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: orblox-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: orblox-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: orblox-minio-admin
      MINIO_ROOT_PASSWORD: orblox-minio-password
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot init container that creates the public bucket the app expects.
  minio-init:
    image: minio/mc:latest
    container_name: orblox-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 orblox-minio-admin orblox-minio-password &&
      (mc mb -p local/orblox || true) &&
      mc anonymous set download local/orblox &&
      echo 'MinIO bucket orblox ready (public read).'
      "

volumes:
  postgres-data:
  redis-data:
  minio-data:
